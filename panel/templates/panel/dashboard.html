{% extends 'panel/base_panel.html' %}
{% block title %}Dashboard - BRTL Panel{% endblock %}

{% block content %}
<div class="topbar">
    <h1>Dashboard</h1>
</div>

<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:16px;">
    {% for card in cards %}
    <a href="{% url 'panel_item_list' model_name=card.key %}" style="text-decoration:none; color:inherit;">
        <div class="card">
            <div style="font-size:13px; color:#586069;">{{ card.label }}</div>
            <div style="font-size:28px; font-weight:700; margin-top:6px;">{{ card.count }}</div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
