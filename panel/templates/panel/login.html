{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#06b6d4);
}

.login-card{
    width:100%;
    max-width:400px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.login-card h2{
    text-align:center;
    color:#4f46e5;
    margin-bottom:30px;
    font-size:30px;
    font-weight:700;
}

.error{
    background:#ffe5e5;
    color:#d90429;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
    font-size:14px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:2px solid #e5e7eb;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    outline:none;
    border-color:#4f46e5;
    box-shadow:0 0 12px rgba(79,70,229,.2);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4f46e5,#7c3aed);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(79,70,229,.3);
}

.footer-text{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}

@media(max-width:500px){
    .login-card{
        padding:30px 25px;
    }

    .login-card h2{
        font-size:26px;
    }
}
</style>

<div class="login-page">

    <div class="login-card">

        <h2>Admin Login</h2>

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>
            </div>

            <div class="input-group">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="footer-text">
            © 2026 Admin Control Panel
        </div>

    </div>

</div>

{% endblock %}
