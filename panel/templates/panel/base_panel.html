<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BRTL Panel{% endblock %}</title>
<style>
    :root {
        --sidebar-w: 240px;
        --accent: #1f8a4c;
        --bg: #f4f6f8;
        --border: #e1e4e8;
        --text: #24292e;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
    }
    .panel-wrap { display: flex; min-height: 100vh; }
    .sidebar {
        width: var(--sidebar-w);
        background: #17212b;
        color: #cfd8dc;
        padding: 20px 0;
        flex-shrink: 0;
    }
    .sidebar h2 {
        color: #fff;
        font-size: 18px;
        padding: 0 20px 16px;
        margin: 0 0 12px;
        border-bottom: 1px solid #2a3742;
    }
    .sidebar a {
        display: block;
        padding: 10px 20px;
        color: #cfd8dc;
        text-decoration: none;
        font-size: 14px;
    }
    .sidebar a:hover, .sidebar a.active {
        background: #24313d;
        color: #fff;
        border-left: 3px solid var(--accent);
    }
    .sidebar .logout {
        margin-top: 20px;
        border-top: 1px solid #2a3742;
        padding-top: 12px;
    }
    .main { flex: 1; padding: 28px 32px; }
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    .topbar h1 { font-size: 22px; margin: 0; }
    .btn {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        text-decoration: none;
        font-size: 14px;
        cursor: pointer;
    }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #d64545; }
    .card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
    }
    th { color: #586069; font-weight: 600; }
    .actions a, .actions button {
        margin-right: 8px;
        font-size: 13px;
    }
    .messages { list-style: none; padding: 0; margin: 0 0 16px; }
    .messages li {
        padding: 10px 14px;
        border-radius: 6px;
        background: #e6f4ea;
        color: #1f8a4c;
        margin-bottom: 8px;
        font-size: 14px;
    }
    .empty { color: #6c757d; padding: 20px 0; }
    form p { margin: 0 0 14px; }
    form label { display: block; font-size: 13px; margin-bottom: 4px; color: #586069; }
    form input[type=text], form input[type=number], form input[type=email],
    form input[type=file], form textarea, form select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 5px;
        font-size: 14px;
    }
    form textarea { min-height: 100px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="panel-wrap">
    <div class="sidebar">
        <h2>BRTL Panel</h2>
        <a href="{% url 'dashboard' %}" class="{% if not model_name %}active{% endif %}">Dashboard</a>
        {% for key, entry in registry.items %}
        <a href="{% url 'panel_item_list' model_name=key %}" class="{% if model_name == key %}active{% endif %}">{{ entry.label }}</a>
        {% endfor %}
        <div class="logout">
            <a href="{% url 'panel_logout' %}">Log out</a>
        </div>
    </div>
    <div class="main">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}<li>{{ message }}</li>{% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</div>
</body>
</html>
